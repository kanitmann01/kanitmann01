services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kanitmann01-mcp
    ports:
      - "${MCP_PORT:-8080}:8080"
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-stdio}
      - MCP_HOST=${MCP_HOST:-0.0.0.0}
      - MCP_PORT=${MCP_PORT:-8080}
    volumes:
      - ./mcp_server:/app/mcp_server
    restart: unless-stopped
